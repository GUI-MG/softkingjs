<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <!-- BootStrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
</head>
<body>
    
    <nav id="navbar">
        <div class="container">
            <div class="nav_image">
                <img src="../assets/img/logo/logo_Soft_King.png" alt="Logo SoftKing" id="logo" onclick="window.location.href='index.html'">
            </div>

            <div class="nav_actions">
                <ul>
                    <button class="navbar" onclick="window.location.href='../index.html'">
                        <i class="bi bi-house"></i>    Home
                    </button>
                </ul>
                <ul>
                    <button class="navbar" onclick="window.location.href='/produtos/produtos.html'">
                        <i class="bi bi-bag-fill"></i>    Produtos
                    </button>
                </ul>
                <ul>
                    <button class="navbar" onclick="window.location.href='../login/login.html'">
                        <i class="bi bi-person-fill"></i>    Conta
                    </button>
                </ul>
            </div>
        </div>
    </nav>

    <div id="bodyHeader" class="container">
        <div class="container" id="clear">
            <button class="clearCarrinho" onclick="limparCarrinho()">Limpar carrinho</button>        
        </div>
    </div>

    <section id="cartView" class="container">
        <div id="produtosCarrinho" class="container">
            <!-- Produtos serão renderizados aqui. -->
        </div>
    </section>
    
    <section id="carrinhoTotal" class="container">
        <!-- Preço total será renderizado aqui. -->
    </section>

    <section id="compraDoCarrinho">
        <!-- Finalização da compra do carrinho -->
    </section>

    <footer>
        <div class="container" id="footer">
            <small>&copySoftKing</small>
        </div>
    </footer>
    
    <script src="../js/scripts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>
</html>
