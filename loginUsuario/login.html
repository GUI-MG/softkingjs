<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <!-- BootStrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
</head>
<body>
    <nav id="navbar">
        <div class="container">
            <div class="nav_image">
                <img src="../assets/img/logo/logo_Soft_King.png" alt="Logo SoftKing" id="logo">
            </div>
            <ul>
                <button class="navbar" onclick="window.location.href='../index.html'">
                    <i class="bi bi-arrow-up-left"></i>  Voltar
                </button>
            </ul>
        </div>
    </nav>
    
    <section id="loginForm" class="container">
        <div id="loginContainer" class="container">
            <h1>
                <i class="bi bi-person-fill"></i>    Login
            </h1>

            <form autocomplete="off" id="login">
                <p>
                    <label for="user"><strong>Usuário</strong></label>
                </p>
                <p>
                    <input type="text" id="user" required>
                </p>
                <p>
                    <label for="senha"><strong>Senha</strong></label>
                </p>
                <p id="passwordPart">
                    <input type="password" id="senha" required>
                    <button  type="button" id="showPassword">
                        <i class="bi bi-eye" id="iconSenha"></i>
                    </button>
                </p>
                <p class="submit">
                    <button id="fazerLogin" type="submit">Entrar</button>
                </p>
            </form>

            <div id="cadastrar-se" class="container">
                <p>
                    <strong><i>Não possui conta?</i></strong>
                </p>
                <button onclick="window.location.href='../cadastroUsuario/cadastro.html'" id="cadastrar">
                    Cadastrar-se
                </button>
            </div>
        </div>
    </section>

    <footer>
        <div class="container" id="footer">
            <small>&copySoftKing</small>
        </div>
    </footer>

    <script>
        const showPassword = document.getElementById('showPassword');
        const senha = document.getElementById('senha');
        const icon = document.getElementById('iconSenha');

        showPassword.addEventListener('click', () => {
            if(senha.type == 'password') {
                senha.type = 'text';
                iconSenha.classList.replace('bi-eye', 'bi-eye-slash');
            }else {
                senha.type = 'password';
                iconSenha.classList.replace('bi-eye-slash', 'bi-eye');
            }
        })
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/loginUsuario/login.js"></script>
</body>
</html>
