<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <nav id="navbar">
        <div class="container">
            <div class="nav_image">
                <img src="../assets/img/logo/logo_Soft_King.png" alt="Logo SoftKing" id="logo">
            </div>
        </div>
    </nav>
    
    <section id="loginForm" class="container">
        <div id="loginContainer" class="container">
            <h1>
                BEM VINDO DE VOLTA!
            </h1>

            <form action="login.php" method="post" autocomplete="off">
                <p>
                    <label for="user"><strong>Usuário</strong></label>
                </p>
                <p>
                    <input type="text" id="user">
                </p>
                <p>
                    <label for="senha"><strong>Senha</strong></label>
                </p>
                <p>
                    <input type="password" id="senha">
                </p>
                <p class="submit">
                    <input type="submit" value="Fazer login" id="fazerLogin">
                </p>
            </form>

            <div id="cadastrar-se" class="container">
                <p>
                    Não possui conta?
                </p>
                <button onclick="window.location.href='../cadastro/cadastro.html'" id="cadastrar">
                    Cadastrar-se
                </button>
            </div>
        </div>
    </section>

    <footer>
        <div class="container" id="footer">
            <small>&copySoftKing</small>
        </div>
    </footer>
</body>
</html>
