<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <nav id="navbar">
        <div class="container">
            <div class="nav_image">
                <img src="../assets/img/logo/logo_Soft_King.png" alt="Logo SoftKing" id="logo">
            </div>
        </div>
    </nav>
    
    <section id="cadastro" class="container">
        <div class="container">
            <p>
                <label for="nome">
                    Nome:
                </label>                
            </p>
            <p>
                <label for="sobrenome">
                    Sobrenome: 
                </label>                
            </p>
            <p>
                <label for="email">
                    Email:
                </label>                
            </p>
            <p>
                <label for="rua">
                    Rua: 
                </label>                
            </p>
            <p>
                <label for="cidade">
                    Cidade:
                </label>                
            </p>
            <p>
                <label for="numero">
                    Número:
                </label>                
            </p>
            <p>
                <label for="cep">
                    CEP:
                </label>                
            </p>
        </div>
    </section>

    <footer>
        <div class="container" id="footer">
            <small>&copySoftKing</small>
        </div>
    </footer>

</body>
</html>
