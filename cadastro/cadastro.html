<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <nav id="navbar">
        <div class="container">
            <div class="nav_image">
                <img src="../assets/img/logo/logo_Soft_King.png" alt="Logo SoftKing" id="logo">
            </div>
            <div class="nav_actions">
                <ul>
                    <button class="navbar" onclick="window.location.href='../login/login.html'">
                        Voltar
                    </button>
                </ul>
            </div>
        </div>
    </nav>
    
    <main>
        <section id="cadastro" class="container">
            <div class="container">
                <p>
                    <h1><strong>Cadastro de Usuário:</strong></h1>
                </p>
                <form action="cadastro.php" method="post" autocomplete="off" id="cadastroUsuario">
                    <p>
                        <label for="nome">
                            <strong>Nome:</strong>
                        </label>                
                    </p>
                    <p>
                        <input type="text" id="nome">
                    </p>
                    <p>
                        <label for="sobrenome">
                            <strong>Sobrenome:</strong>
                        </label>                
                    </p>
                    <p>
                        <input type="text" id="sobrenome">
                    </p>
                    <p>
                        <label for="email">
                            <strong>Email:</strong>
                        </label>                
                    </p>
                    <p>
                        <input type="text" id="email">
                    </p>
                    <p>
                        <label for="rua">
                            <strong>Rua:</strong>
                        </label>                
                    </p>
                    <p>
                        <input type="text" id="rua">
                    </p>
                    <p>
                        <label for="cidade">
                            <strong>Cidade:</strong>
                        </label>                
                    </p>
                    <p>
                        <input type="text" id="cidade">
                    </p>
                    <p>
                        <label for="numero">
                            <strong>Número:</strong>
                        </label>                
                    </p>
                    <p>
                        <input type="text" id="numero">
                    </p>
                    <p>
                        <label for="cep">
                            <strong>CEP:</strong>
                        </label>                
                    </p>
                    <p>
                        <input type="text" id="cep">
                    </p>
                    <p>
                        <label for="senhaCadastro">
                            <strong>Senha:</strong>
                        </label>
                    </p>
                    <p>
                        <input type="password" id="senhaCadastro">
                    </p>
                    <p>
                        <label for="confirmarSenhaCadastro">
                            <strong>Confirmar Senha:</strong>
                        </label>
                    </p>
                    <p>
                        <input type="password" id="confirmarSenhaCadastro">
                    </p>
                    <p class="submitCadastro">
                        <input type="submit" id="efetuarCadastro" value="Cadastrar-se">
                    </p>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="container" id="footer">
            <small>&copySoftKing</small>
        </div>
    </footer>

</body>
</html>
