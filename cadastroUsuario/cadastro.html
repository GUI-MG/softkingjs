<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <!-- BootStrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
</head>
<body>

    <nav id="navbar">
        <div class="container">
            <div class="nav_image">
                <img src="../assets/img/logo/logo_Soft_King.png" alt="Logo SoftKing" id="logo">
            </div>
            <div class="nav_actions">
                <ul>
                    <button class="navbar" onclick="window.location.href='../loginUsuario/login.html'">
                        <i class="bi bi-arrow-up-left"></i>  Voltar
                    </button>
                </ul>
            </div>
        </div>
    </nav>
    
    <main>
        <section id="cadastro" class="container">
            <div class="container">
                <p>
                    <h1><strong><i class="bi bi-pen-fill"></i>    Cadastro de Usuário:</strong></h1>
                </p>
                <form action="../js/cadastroUsuario/cadastro.js" method="post" autocomplete="off" id="cadastroUsuario">
                    <p>
                        <label for="nome">
                            <strong>Nome:</strong>
                        </label>                
                    </p>
                    <p>
                        <input type="text" id="nome" required>
                    </p>
                    <p>
                        <label for="sobrenome">
                            <strong>Sobrenome:</strong>
                        </label>                
                    </p>
                    <p>
                        <input type="text" id="sobrenome" required>
                    </p>
                    <p>
                        <label for="telefone"><strong>Telefone:</strong></label>
                    </p>
                    <p>
                        <input type="text" id="telefone">
                    </p>
                    <p>
                        <label for="email">
                            <strong>Email:</strong>
                        </label>                
                    </p>
                    <p>
                        <input type="text" id="email" required>
                    </p>
                    <p>
                        <label for="rua">
                            <strong>Rua:</strong>
                        </label>                
                    </p>
                    <p>
                        <input type="text" id="rua" required>
                    </p>
                    <p>
                        <label for="cidade">
                            <strong>Cidade:</strong>
                        </label>                
                    </p>
                    <p>
                        <input type="text" id="cidade" required>
                    </p>
                    <p>
                        <label for="numero">
                            <strong>Número:</strong>
                        </label>                
                    </p>
                    <p>
                        <input type="text" id="numero" required>
                    </p>
                    <p>
                        <label for="cep">
                            <strong>CEP:</strong>
                        </label>                
                    </p>
                    <p>
                        <input type="text" id="cep" required>
                    </p>
                    <p>
                        <label for="usuarioCadastro">
                            <strong>Usuário:</strong>
                        </label>
                    </p>
                    <p>
                        <input type="text" id="usuarioCadastro" required>
                    </p>
                    <p>
                        <label for="senhaCadastro">
                            <strong>Senha:</strong>
                        </label>
                    </p>
                    <p id="passwordPart">
                        <input type="password" id="senhaCadastro" required>
                        <button  type="button" id="showPasswordSenha">
                            <i class="bi bi-eye" id="iconSenha"></i>
                        </button>
                    </p>
                    <p>
                        <label for="confirmarSenhaCadastro">
                            <strong>Confirmar Senha:</strong>
                        </label>
                    </p>
                    <p id="passwordPart">
                        <input type="password" id="confirmarSenhaCadastro" required>
                        <button  type="button" id="showPasswordConfirmarSenha">
                            <i class="bi bi-eye" id="iconConfirmarSenha"></i>
                        </button>
                    </p>
                    <p id="submitCadastro">
                        <input type="submit" id="efetuarCadastro" value="Cadastrar-se">
                    </p>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="container" id="footer">
            <small>&copySoftKing</small>
        </div>
    </footer>

    <script>
        const showPasswordSenha = document.getElementById('showPasswordSenha');
        const showPasswordConfirmarSenha = document.getElementById('showPasswordConfirmarSenha');
        const senha = document.getElementById('senhaCadastro');
        const confirmarSenha = document.getElementById('confirmarSenhaCadastro')
        const icon = document.getElementById('iconSenha');
        const iconConfirmar = document.getElementById('iconConfirmarSenha');

        showPasswordSenha.addEventListener('click', () => {
            if(senha.type == 'password') {
                senha.type = 'text';
                iconSenha.classList.replace('bi-eye', 'bi-eye-slash');
            }else{
                senha.type = 'password';
                iconSenha.classList.replace('bi-eye-slash', 'bi-eye');
            } 
            
        })

        showPasswordConfirmarSenha.addEventListener('click', () => {
            if(confirmarSenha.type == 'password') {
                confirmarSenha.type = 'text';
                iconConfirmarSenha.classList.replace('bi-eye', 'bi-eye-slash');
            }else {
                confirmarSenha.type = 'password';
                iconConfirmarSenha.classList.replace('bi-eye-slash', 'bi-eye');
            }
        })
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/cadastroUsuario/cadastro.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
