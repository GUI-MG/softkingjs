<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <!-- BootStrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
</head>
<body>

    <nav id="navbar">
        <div class="container">
            <div class="nav_image">
                <img src="../assets/img/logo/logo_Soft_King.png" alt="Logo SoftKing" id="logo">
            </div>
            <div class="nav_actions">
                <ul>
                    <button class="navbar" onclick="window.location.href='../loginUsuario/login.html'">
                        <i class="bi bi-arrow-up-left"></i>  Voltar
                    </button>
                </ul>
            </div>
        </div>
    </nav>
    
    <main>
        <section id="cadastro" class="container">
            <div class="container">
                <p>
                    <h1><strong><i class="bi bi-pen-fill"></i>    Cadastro de Usuário:</strong></h1>
                </p>
                <form action="../../api/usuarios/cadastro/cadastro.php" method="post" autocomplete="off" id="cadastroUsuario">
                    <p>
                        <label for="nome">
                            <strong>Nome:</strong>
                        </label>                
                    </p>
                    <p>
                        <input type="text" id="nome" required>
                    </p>
                    <p>
                        <label for="sobrenome">
                            <strong>Sobrenome:</strong>
                        </label>                
                    </p>
                    <p>
                        <input type="text" id="sobrenome" required>
                    </p>
                    <p>
                        <label for="email">
                            <strong>Email:</strong>
                        </label>                
                    </p>
                    <p>
                        <input type="text" id="email" required>
                    </p>
                    <p>
                        <label for="rua">
                            <strong>Rua:</strong>
                        </label>                
                    </p>
                    <p>
                        <input type="text" id="rua" required>
                    </p>
                    <p>
                        <label for="cidade">
                            <strong>Cidade:</strong>
                        </label>                
                    </p>
                    <p>
                        <input type="text" id="cidade" required>
                    </p>
                    <p>
                        <label for="numero">
                            <strong>Número:</strong>
                        </label>                
                    </p>
                    <p>
                        <input type="text" id="numero" required>
                    </p>
                    <p>
                        <label for="cep">
                            <strong>CEP:</strong>
                        </label>                
                    </p>
                    <p>
                        <input type="text" id="cep" required>
                    </p>
                    <p>
                        <label for="usuarioCadastro">
                            <strong>Usuário:</strong>
                        </label>
                    </p>
                    <p>
                        <input type="text" id="usuarioCadastro" required>
                    </p>
                    <p>
                        <label for="senhaCadastro">
                            <strong>Senha:</strong>
                        </label>
                    </p>
                    <p>
                        <input type="password" id="senhaCadastro" required>
                    </p>
                    <p>
                        <label for="confirmarSenhaCadastro">
                            <strong>Confirmar Senha:</strong>
                        </label>
                    </p>
                    <p>
                        <input type="password" id="confirmarSenhaCadastro" required>
                    </p>
                    <p id="submitCadastro">
                        <input type="submit" id="efetuarCadastro" value="Cadastrar-se">
                    </p>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="container" id="footer">
            <small>&copySoftKing</small>
        </div>
    </footer>

    <script>

        const formulario = document.getElementById('cadastroUsuario');

        formulario.addEventListener('submit', async function(evento) {
            evento.preventDefault();

            let senhaReal = document.getElementById('senhaCadastro').value;
            let senhaConfirmada = document.getElementById('confirmarSenhaCadastro').value;

            let senhaRealSplit = senhaReal.split();
            let senhaConfirmadaSplit = senhaConfirmada.split();
            
            if(senhaConfirmadaSplit!=senhaRealSplit) {
                Swal.fire({
                    title: 'Oops! Senha (s) incorreta (s).',
                    confirmButtonText: 'Ok',
                    confirmButtonColor: 'rgb(0, 160, 0)', 
                    icon: 'warning'
                });
                return;
            }

            const dados = {
                usuario: document.gelElementById('usuarioCadastro').value,
                senha: document.gelElementById('senhaCadastro').value,
                nome: document.getElementById('nome').value,
                sobrenome: document.getElementById('sobrenome').value,
                email: document.getElementById('email').value,
                rua: document.getElementById('rua').value,
                cidade: document.getElementById('cidade').value,
                numero: document.getElementById('numero').value,
                cep: document.getElementById('cep').value 
            }

            try {
                const answer = await fetch('../../api/usuarios/cadastro/cadastro.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(dados)
                });

                const result = await answer.json();

                if(answer.ok) {
                    Swal.fire({
                        title: 'Sucesso!',
                        text: 'Usuário cadastrado.',
                        confirmButtonText: 'Ok',
                        confirmButtonColor: 'rgb(0, 160, 0)',
                        icon: 'success'
                    });
                    formulario.reset();
                }else {
                    Swal.fire({
                        title: 'Oops!',
                        text: 'Ocorreu um erro',
                        confirmButtonText: 'Ok',
                        confirmButtonColor: 'rgb(0, 160, 0)',
                        icon: 'warning'
                    });
                }
            } catch (error) {
                Swal.fire({
                    title: 'Erro',
                    text: 'Não foi possível conectar ao servidor...',
                    confirmButtonText: 'Ok',
                    confirmButtonColor: 'rgb(0, 160, 0)',
                    icon: 'error'
                })
            }

        });

    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
